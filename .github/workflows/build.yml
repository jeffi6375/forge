name: Build

on:
  push:
    branches:
      - main
      - cicd-docker
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    env:
      DEVKITPRO: /opt/devkitpro

    steps:
      - name: Install git+python
        run: apt install git python3 python3-venv -y

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install toolchains and Python deps
        shell: bash
        run: |
          set -euo pipefail

          dkp-pacman -Syu --noconfirm
          dkp-pacman -S --noconfirm --needed \
            devkitARM \
            switch-dev

          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          source /etc/profile.d/devkit-env.sh
          source .venv/bin/activate
          make -j$(nproc)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: forge-build-${{ github.sha }}
          path: |
            subsdk.nso
            main.npdm

